name: Fetch Real News
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install requests beautifulsoup4
    - run: python fetch_real_news.py
    - run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add news_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update news $(date +'%Y-%m-%d %H:%M')" && git push)
